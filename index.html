<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習進度地圖</title>
    <style>
        :root { --bg-color: #1a1c1e; --card-bg: #2b2d31; --gold: #ffb800; --text-color: #e0e0e0; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        h2 { text-align: center; color: var(--gold); margin-bottom: 30px; }

        /* 地圖頁面 */
        .map-card { 
            background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 6px solid var(--gold); cursor: pointer; transition: 0.3s;
        }
        .map-card.done { border-left-color: #43b581; opacity: 0.7; }
        .tag { background: #35373c; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; color: #aaa; }

        /* 測驗頁面 */
        .quiz-view { display: none; background: var(--card-bg); border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .q-title { font-size: 1.1rem; line-height: 1.6; margin-bottom: 25px; }
        .opt-btn { 
            background: #383a40; border: 1px solid #4e5058; color: #fff; width: 100%;
            padding: 18px; margin-bottom: 12px; border-radius: 10px; text-align: left;
            cursor: pointer; font-size: 1rem; transition: 0.2s;
        }
        .opt-btn:hover { background: #404249; }
        .opt-btn.active { border-color: var(--gold); background: #404249; }
        
        .footer-btns { margin-top: 20px; }
        .btn-main { background: #4e5058; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-back { background: none; border: 1px solid #4e5058; color: #888; width: 100%; padding: 12px; border-radius: 10px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="view-map">
        <h2>🎯 學習進度地圖</h2>
        <div id="map-list">載入雲端地圖中...</div>
    </div>

    <div id="view-quiz" class="quiz-view">
        <h2 id="stage-title" style="font-size: 1.2rem; margin-top:0;"></h2>
        <div id="quiz-content"></div>
        <div class="footer-btns">
            <button id="btn-next" class="btn-main" onclick="handleNext()">下一題</button>
            <button class="btn-back" onclick="exitQuiz()">返回地圖</button>
        </div>
    </div>
</div>

<script>
    // 已更新為你的最新 GAS 網址
    const API = "https://script.google.com/macros/s/AKfycbxw9DHVse2RFDd5pLQWARcTu35hncsZ3EWsh62bVSSE9gWX_gD-kVh-4f55rCU9qJ3m/exec";
    const UID = "MEMBER_001"; // 預設會員編號
    let mapData = [];
    let currentStage = null;
    let currentIdx = 0;
    let userAnswers = [];
    let selectedOpt = null;

    async function fetchMap() {
        const res = await fetch(`${API}?action=getMapData&userId=${UID}`);
        const result = await res.json();
        mapData = result.mapData;
        renderMap();
    }

    function renderMap() {
        const list = document.getElementById('map-list');
        list.innerHTML = "";
        mapData.forEach(item => {
            const card = document.createElement('div');
            card.className = `map-card ${item.isFinished ? 'done' : ''}`;
            card.onclick = () => {
                if(item.isFinished) return alert("此階段測驗已完成！");
                if(item.questions.length === 0) return alert("此階段目前無開放題目。");
                enterQuiz(item);
            };
            card.innerHTML = `
                <span style="font-weight:bold;">${item.stageName}</span>
                <span class="tag">${item.isFinished ? '已完成' : '開放中'}</span>
            `;
            list.appendChild(card);
        });
    }

    function enterQuiz(stage) {
        currentStage = stage;
        currentIdx = 0;
        userAnswers = [];
        document.getElementById('view-map').style.display = 'none';
        document.getElementById('view-quiz').style.display = 'block';
        document.getElementById('stage-title').innerText = stage.stageName;
        renderQuestion();
    }

    function renderQuestion() {
        selectedOpt = null;
        const q = currentStage.questions[currentIdx];
        const content = document.getElementById('quiz-content');
        content.innerHTML = `
            <div class="q-title">Q${currentIdx+1}. ${q.title}</div>
            ${q.options.map((opt, i) => `
                <button class="opt-btn" onclick="selectOpt(this, ${i})">${['A','B','C','D'][i]}. ${opt}</button>
            `).join('')}
        `;
        document.getElementById('btn-next').innerText = currentIdx === currentStage.questions.length - 1 ? "儲存結果並提交" : "下一題";
    }

    function selectOpt(btn, idx) {
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedOpt = ['A','B','C','D'][idx];
    }

    async function handleNext() {
        if (!selectedOpt) return alert("請先選擇一個選項");
        userAnswers.push(selectedOpt);

        if (currentIdx < currentStage.questions.length - 1) {
            currentIdx++;
            renderQuestion();
        } else {
            submitFinal();
        }
    }

    async function submitFinal() {
        const btn = document.getElementById('btn-next');
        btn.innerText = "正在儲存結果...";
        btn.disabled = true;

        // 計算分數 (簡單比對)
        let score = 0;
        currentStage.questions.forEach((q, i) => {
            if(q.answer === userAnswers[i]) score += 10;
        });

        const url = `${API}?action=submitRecord&userId=${UID}&stage=${currentStage.stageName}&score=${score}&detail=${userAnswers.join(',')}`;
        await fetch(url);
        
        alert("作答完畢！紀錄已成功儲存。");
        location.reload();
    }

    function exitQuiz() {
        if(confirm("確定要離開嗎？目前的作答進度將不會儲存。")) location.reload();
    }

    fetchMap();
</script>
</body>
</html>
