<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 交易員培訓測驗系統</title>
    <style>
        :root { --primary: #f3ba2f; --bg: #121213; --card: #1e2023; --success: #4CAF50; --error: #ff4d4d; --text: #eaecef; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; margin: 0; }
        .container { max-width: 600px; margin: 40px auto; background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 4px 25px rgba(0,0,0,0.6); }
        .hidden { display: none; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; }
        
        /* 登入區塊 */
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; background: #2b2f36; color: #fff; border: 1px solid #444; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color: #000; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #ffca42; transform: translateY(-2px); }
        button:disabled { background: #474d57; color: #848e9c; cursor: not-allowed; }
        
        /* 地圖卡片 */
        .quiz-card { background: #2b2f36; margin: 15px 0; padding: 20px; border-radius: 12px; border-left: 6px solid #444; transition: 0.3s; position: relative; }
        .quiz-card.open { border-left-color: var(--primary); cursor: pointer; }
        .quiz-card.open:hover { background: #3a3f47; transform: translateX(8px); }
        .quiz-card.done { border-left-color: var(--success); opacity: 0.8; cursor: default; }
        .status-tag { float: right; font-size: 14px; font-weight: bold; padding: 2px 8px; border-radius: 4px; background: rgba(0,0,0,0.3); }

        /* 題目樣式 */
        .q-box { background: #2b2f36; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #3e444d; }
        .options label { display: block; padding: 12px; background: rgba(255,255,255,0.05); margin: 10px 0; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .options label:hover { background: rgba(255,255,255,0.12); }
        .options input { margin-right: 12px; transform: scale(1.3); vertical-align: middle; }
        
        .grad-screen { text-align: center; padding: 40px 20px; border: 2px dashed var(--primary); border-radius: 20px; margin-top: 30px; background: rgba(243, 186, 47, 0.05); }
        .loading-text { text-align: center; color: var(--primary); font-weight: bold; padding: 20px; }
        .error-box { color: var(--error); border: 1px solid var(--error); padding: 15px; border-radius: 8px; font-size: 14px; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginPage">
        <h2>🚀 學員系統登入</h2>
        <div style="text-align: center;">
            <p style="color:#888; margin-bottom: 20px;">首次進入請自訂 6 碼編號與密碼</p>
            <input type="text" id="uid" placeholder="會員編號 (6位數)" maxlength="6">
            <input type="password" id="pwd" placeholder="登入密碼 (6位數)" maxlength="6">
            <button id="loginBtn" onclick="handleLogin()">進入學習地圖</button>
        </div>
    </div>

    <div id="mapPage" class="hidden">
        <h2>🎯 學習地圖進度</h2>
        <div id="quizList" class="loading-text">📡 正在同步雲端資料...</div>
        <div id="gradMessage" class="hidden grad-screen">
            <h1 style="color:var(--primary); font-size: 40px;">🎓</h1>
            <h2>恭喜畢業！</h2>
            <p>您已完成所有 6 個階段的測驗</p>
            <button onclick="location.reload()" style="width:auto; padding: 10px 30px; background:#444; color:#fff; font-size: 14px;">切換帳號登出</button>
        </div>
    </div>

    <div id="quizPage" class="hidden">
        <h2 id="quizTitle">測驗進行中</h2>
        <div id="qContent"></div>
        <button id="subBtn" onclick="submitQuiz()">提交並存檔結果</button>
        <button onclick="showPage('mapPage')" style="background:transparent; color:#888; font-size: 14px; margin-top: 15px;">暫時返回地圖</button>
    </div>
</div>

<script>
    // 🔗 您的後端 API 網址 (已驗證可用)
    const API_URL = "https://script.google.com/macros/s/AKfycbwsXqDVq6rqx-GLrJrNRs2Y1pv5crK5ohDIt1xg5vM-7SxtbK0HAt6fqiA8ZIslCFw4cA/exec"; 
    let currentUser = "", currentQuizId = "", allData = {};

    // 1. 登入邏輯
    async function handleLogin() {
        const uid = document.getElementById('uid').value;
        const pwd = document.getElementById('pwd').value;
        const btn = document.getElementById('loginBtn');
        
        if(uid.length < 6 || pwd.length < 6) return alert("編號與密碼皆需為 6 碼數字");
        
        btn.disabled = true;
        btn.innerText = "驗證中...";
        
        try {
            await fetch(API_URL, { 
                method: 'POST', 
                body: new URLSearchParams({ action: 'login', uid: uid, pwd: pwd }), 
                mode: 'no-cors' 
            });
            currentUser = uid;
            showPage('mapPage');
            loadProgress();
        } catch (e) {
            alert("伺服器連線異常");
            btn.disabled = false;
        }
    }

    // 2. 載入進度 (核心修正版)
    async function loadProgress() {
        const listDiv = document.getElementById('quizList');
        listDiv.innerHTML = "📡 同步雲端資料中...";
        
        try {
            // 抓取題目與學員進度
            const [qRes, pRes] = await Promise.all([
                fetch(`${API_URL}?action=getQuiz`, { redirect: 'follow' }),
                fetch(`${API_URL}?action=checkProgress&uid=${currentUser}`, { redirect: 'follow' })
            ]);
            
            const qText = await qRes.text();
            
            // 檢查是否抓到 HTML (通常是權限沒開)
            if (qText.includes("<!DOCTYPE html>")) {
                throw new Error("權限受限：API 回傳了登入頁面而非資料，請確認 GAS 部署為『所有人』。");
            }

            allData = JSON.parse(qText);
            const doneList = await pRes.json();
            
            listDiv.innerHTML = "";
            let doneCount = 0;

            // 產生 1 到 6 階段的卡片
            for(let i=1; i<=6; i++) {
                const isOpen = allData.openStatus && allData.openStatus[String(i)] === true;
                const isDone = doneList.includes(String(i));
                if(isDone) doneCount++;

                const div = document.createElement('div');
                div.className = `quiz-card ${isOpen ? 'open' : ''} ${isDone ? 'done' : ''}`;
                
                let statusText = isDone ? "✅ 已完成" : (isOpen ? "👉 點擊開始" : "🔒 尚未開放");
                div.innerHTML = `<span class="status-tag">${statusText}</span><b>階段 ${i} 測驗</b>`;
                
                if(isOpen && !isDone) div.onclick = () => startQuiz(i);
                listDiv.appendChild(div);
            }

            if(doneCount === 6) document.getElementById('gradMessage').classList.remove('hidden');
        } catch (e) {
            console.error(e);
            listDiv.innerHTML = `<div class="error-box">
                ❌ 資料載入失敗<br>詳情：${e.message}
            </div>`;
        }
    }

    // 3. 顯示題目
    function startQuiz(id) {
        currentQuizId = id;
        const questions = allData.quizzes[id];
        if(!questions) return alert("此階段尚未設置題目資料");

        document.getElementById('quizTitle').innerText = `階段 ${id} 測驗`;
        document.getElementById('qContent').innerHTML = questions.map((q, i) => `
            <div class="q-box">
                <p><b>Q${i+1}. ${q.title}</b></p>
                <div class="options">
                    ${q.options.map((opt, j) => `
                        <label><input type="radio" name="q${i}" value="${String.fromCharCode(65+j)}" required> ${String.fromCharCode(65+j)}. ${opt}</label>
                    `).join('')}
                </div>
            </div>
        `).join('');
        showPage('quizPage');
        window.scrollTo(0,0);
    }

    // 4. 提交結果
    async function submitQuiz() {
        const questions = allData.quizzes[currentQuizId];
        let correct = 0;
        let userAnswers = {};

        for(let i=0; i < questions.length; i++) {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            if(!sel) return alert("請完成所有題目後再提交！");
            if(sel.value === questions[i].answer) correct++;
            userAnswers[`Q${i+1}`] = sel.value;
        }

        const score = Math.round((correct / questions.length) * 100);
        const subBtn = document.getElementById('subBtn');
        subBtn.disabled = true;
        subBtn.innerText = "💾 正在存檔...";

        try {
            await fetch(API_URL, { 
                method: 'POST', 
                body: new URLSearchParams({
                    action: 'submit',
                    uid: currentUser,
                    quizId: currentQuizId,
                    score: score,
                    answers: JSON.stringify(userAnswers)
                }), 
                mode: 'no-cors' 
            });
            alert(`提交成功！本階段得分：${score}`);
            showPage('mapPage');
            loadProgress();
        } catch (e) {
            alert("存檔失敗");
            subBtn.disabled = false;
        }
    }

    function showPage(id) {
        ['loginPage', 'mapPage', 'quizPage'].forEach(p => document.getElementById(p).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
