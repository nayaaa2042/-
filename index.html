<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測驗系統</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: white; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; }
        .quiz-card { 
            background: #2c2e33; 
            padding: 20px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .quiz-title { font-size: 1.2rem; color: #ffcc00; font-weight: bold; }
        .btn-action { 
            background: #ff9900; color: white; border: none; padding: 10px 20px; 
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-action:hover { background: #e68a00; }
        .btn-done { 
            background: #555; color: #aaa; border: none; padding: 10px 20px; 
            border-radius: 6px; cursor: not-allowed; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-list">
        <p>正在載入測驗項目...</p>
    </div>
</div>

<script>
    // 你的 GAS 部署網址
    const API_URL = "https://script.google.com/macros/s/AKfycbykAKQS5TLxfd7mecabWJa7giLek0yAa-KNeWCA9USfQ9TAw8JUqjl64Jr51Q3Hf-iJUA/exec";
    const USER_ID = "guest_user"; // 可根據需求修改 ID

    // 1. 初始化：載入題目
    async function loadQuizzes() {
        try {
            const response = await fetch(`${API_URL}?action=getQuiz&userId=${USER_ID}`);
            const data = await response.json();
            renderQuizzes(data);
        } catch (error) {
            document.getElementById('quiz-list').innerHTML = "載入失敗，請檢查網路或 GAS 權限。";
            console.error(error);
        }
    }

    // 2. 渲染 UI
    function renderQuizzes(data) {
        const container = document.getElementById('quiz-list');
        container.innerHTML = ""; // 清空載入中文字

        Object.keys(data.quizzes).forEach(qId => {
            const quiz = data.quizzes[qId][0]; // 取得該類別的第一筆題目資訊
            const isDone = quiz.isFinished;

            const card = document.createElement('div');
            card.className = "quiz-card";
            card.innerHTML = `
                <span class="quiz-title">${quiz.title}</span>
                <button 
                    id="btn-${qId}" 
                    class="${isDone ? 'btn-done' : 'btn-action'}" 
                    onclick="handleStartQuiz('${qId}')"
                    ${isDone ? 'disabled' : ''}>
                    ${isDone ? '已完成' : '點擊作答'}
                </button>
            `;
            container.appendChild(card);
        });
    }

    // 3. 處理作答完成動作
    async function handleStartQuiz(qId) {
        // 這裡模擬測驗過程，你可以放你的測驗彈窗邏輯
        const confirmDone = confirm(`確定要開始並提交「${qId}」的作答紀錄嗎？`);
        
        if (confirmDone) {
            const btn = document.getElementById(`btn-${qId}`);
            btn.innerText = "提交中...";
            btn.disabled = true;

            try {
                // 發送紀錄到 GAS 的 Records 分頁
                const response = await fetch(`${API_URL}?action=submitRecord&qId=${qId}&userId=${USER_ID}`);
                const result = await response.json();

                if (result.status === "success") {
                    alert("作答紀錄已儲存！");
                    // 立即更新 UI 狀態
                    btn.innerText = "已完成";
                    btn.className = "btn-done";
                    btn.disabled = true;
                }
            } catch (error) {
                alert("提交失敗，請重試。");
                btn.innerText = "點擊作答";
                btn.disabled = false;
            }
        }
    }

    // 啟動載入
    loadQuizzes();
</script>

</body>
</html>
